apiVersion: v1
kind: Pod
metadata:
  name: netflix
  labels: 
    app: streaming
spec:
   containers:
     - name: netflix 
       image: abhipraydh96/streaming
       ports:
         - containerPort: 80
---
apiVersion: v1
kind: Service
metadata: 
  name: svc-netflix
spec:
  selector:
    app: streaming
  ports:
    - protocol: "TCP"
      port: 80
      targetPort: 80 
  
